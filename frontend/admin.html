<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - World Chat</title>
    <link rel="stylesheet" href="assets/css/admin.css">
</head>
<body>
    <div id="adminApp">
        <!-- Вход -->
        <div id="adminLogin" class="admin-overlay">
            <div class="admin-modal">
                <h2>Admin Panel</h2>
                <p>Enter password to access</p>
                <input type="password" id="adminPassInput" placeholder="Password" autocomplete="off">
                <button id="adminLoginBtn" class="btn-primary">Enter</button>
                <p id="adminLoginError" style="color:var(--danger);font-size:12px;display:none">Wrong password</p>
            </div>
        </div>

        <!-- Панель -->
        <div id="adminPanel" class="admin-container" style="display:none">
            <!-- Хедер -->
            <div class="admin-header">
                <h2>Admin Panel</h2>
                <span id="adminOnlineCount">0 online</span>
                <button id="adminLogoutBtn" class="btn-secondary">Exit</button>
            </div>

            <!-- Табы -->
            <div class="admin-tabs">
                <button class="admin-tab active" data-tab="messages">Messages</button>
                <button class="admin-tab" data-tab="quick">Quick Messages</button>
                <button class="admin-tab" data-tab="customize">Customize</button>
                <button class="admin-tab" data-tab="users">Users</button>
            </div>

            <!-- Контент -->
            <div class="admin-content">
                <!-- Таб: Сообщения -->
                <div id="tab-messages" class="admin-tab-content active">
                    <div class="admin-messages" id="adminMessagesList"></div>
                </div>

                <!-- Таб: Быстрые сообщения -->
                <div id="tab-quick" class="admin-tab-content">
                    <div class="quick-msgs-header">
                        <h3>Quick Messages</h3>
                        <button id="addQuickMsgBtn" class="btn-primary">+ Add</button>
                    </div>
                    <div id="quickMessagesList"></div>
                    <div id="addQuickMsgForm" style="display:none;margin-top:12px">
                        <textarea id="quickMsgInput" placeholder="Message text..." rows="2" maxlength="200"></textarea>
                        <div style="display:flex;gap:8px;margin-top:8px">
                            <button id="saveQuickMsg" class="btn-primary">Save</button>
                            <button id="cancelQuickMsg" class="btn-secondary">Cancel</button>
                        </div>
                    </div>
                </div>

                <!-- Таб: Кастомизация -->
                <div id="tab-customize" class="admin-tab-content">
                    <div class="customize-section">
                        <h3>Bot Identity</h3>
                        
                        <div class="customize-row">
                            <label>Bot Name</label>
                            <input type="text" id="botName" placeholder="Bot" maxlength="20">
                        </div>
                        
                        <div class="customize-row">
                            <label>Bot Tag</label>
                            <input type="text" id="botTag" placeholder="bot" maxlength="15" style="color:var(--accent)">
                        </div>
                        
                        <div class="customize-row">
                            <label>Bot Avatar</label>
                            <div style="display:flex;align-items:center;gap:10px">
                                <div id="botAvatarPreview" class="bot-avatar-preview"></div>
                                <button id="changeBotAvatar" class="btn-secondary">Change</button>
                            </div>
                        </div>
                    </div>

                    <div class="customize-section">
                        <h3>Message Colors</h3>
                        
                        <div class="customize-row">
                            <label>Background</label>
                            <input type="color" id="botBgColor" value="#1e3a5f">
                        </div>
                        
                        <div class="customize-row">
                            <label>Border</label>
                            <input type="color" id="botBorderColor" value="#2563eb">
                        </div>
                        
                        <div class="customize-row">
                            <label>Text</label>
                            <input type="color" id="botTextColor" value="#e2e8f0">
                        </div>
                        
                        <div class="customize-row">
                            <label>Tag Color</label>
                            <input type="color" id="botTagColor" value="#60a5fa">
                        </div>
                        
                        <div class="customize-row">
                            <label>Name Color</label>
                            <input type="color" id="botNameColor" value="#93c5fd">
                        </div>
                        
                        <button id="applyColors" class="btn-primary" style="margin-top:12px">Apply Colors</button>
                    </div>

                    <div class="customize-section">
                        <h3>Preview</h3>
                        <div class="msg-preview" id="botMsgPreview">
                            <div class="msg-preview-name" id="previewName">Bot</div>
                            <div class="msg-preview-bubble" id="previewBubble">
                                <span class="msg-preview-tag" id="previewTag">bot</span>
                                This is a preview message
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Таб: Пользователи -->
                <div id="tab-users" class="admin-tab-content">
                    <div id="adminUsersList"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="assets/js/utils.js"></script>
    <script src="assets/js/admin.js"></script>
</body>
</html>
