<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0e17">
    <title>World Chat</title>
    <link rel="stylesheet" href="assets/css/chat.css">
    <link rel="stylesheet" href="assets/css/themes.css">
</head>
<body>
    <div id="app">
        <!-- Регистрация -->
        <div id="registration" class="overlay">
            <div class="modal">
                <h2>World Chat</h2>
                <p>Choose your name and username</p>
                
                <div class="input-group">
                    <input type="text" id="regName" placeholder="Name" maxlength="20" autocomplete="off">
                </div>
                
                <div class="input-group">
                    <input type="text" id="regUsername" placeholder="Username" maxlength="15" autocomplete="off">
                    <span id="usernameStatus"></span>
                </div>
                
                <!-- Email верификация -->
                <div class="input-group" id="emailGroup">
                    <label style="font-size:12px;color:var(--text-secondary);display:block;margin-bottom:4px">Email verification (required)</label>
                    <div style="display:flex;gap:6px">
                        <input type="email" id="regEmail" placeholder="your@email.com" style="flex:1">
                        <button id="sendCodeBtn" class="btn-secondary" style="width:auto;white-space:nowrap;padding:8px 14px">Send Code</button>
                    </div>
                    <span id="emailStatus" style="font-size:11px;display:block;margin-top:4px"></span>
                </div>
                
                <!-- Поле для кода -->
                <div class="input-group" id="codeGroup" style="display:none">
                    <label style="font-size:12px;color:var(--text-secondary);display:block;margin-bottom:4px">Verification code</label>
                    <div style="display:flex;gap:6px">
                        <input type="text" id="regCode" placeholder="Enter 6-digit code" maxlength="6" autocomplete="off" style="flex:1;text-align:center;letter-spacing:4px;font-size:18px">
                        <button id="verifyCodeBtn" class="btn-primary" style="width:auto;white-space:nowrap;padding:8px 14px">Verify</button>
                    </div>
                    <span id="codeStatus" style="font-size:11px;display:block;margin-top:4px"></span>
                </div>
                
                <button id="regBtn" class="btn-primary" disabled>Enter Chat</button>
            </div>
        </div>

        <!-- Основной чат -->
        <div id="chatContainer" class="chat-container" style="display:none">
            <div class="chat-header">
                <span class="icon">&#127760;</span>
                <div class="header-info">
                    <h3>World Chat</h3>
                    <span id="connectionStatus">● Connecting...</span>
                </div>
                <span id="onlineCount" class="badge">● 0</span>
                <button id="searchToggle" class="icon-btn" title="Search">&#128269;</button>
                <button id="menuBtn" class="icon-btn" title="Menu">&#8942;</button>
            </div>

            <div id="pinnedMessage" class="pinned-message" style="display:none">
                <div class="pinned-content">
                    <span class="pinned-icon">&#128204;</span>
                    <span id="pinnedText"></span>
                </div>
                <button id="unpinBtn" class="icon-btn-sm">&#10005;</button>
            </div>

            <div class="messages-container" id="messagesContainer">
                <div class="system-msg" id="welcomeMsg"></div>
            </div>

            <button id="scrollBtn" class="scroll-btn" style="display:none">
                &#8595;
                <span id="unreadCount" class="unread-badge" style="display:none">0</span>
            </button>

            <div id="replyPreview" class="reply-preview" style="display:none">
                <div class="rp-info">
                    <span id="rpName"></span>
                    <span id="rpText"></span>
                </div>
                <button id="rpClose" class="icon-btn-sm">&#10005;</button>
            </div>

            <div id="typingIndicator" class="typing-indicator" style="display:none">
                <span id="typingText"></span>
            </div>

            <div class="input-area">
                <button id="plusBtn" class="icon-btn" title="Attach">+</button>
                <div class="input-box">
                    <div id="mediaPreview" class="media-preview" style="display:none"></div>
                    <textarea id="msgInput" placeholder="Message..." rows="1" maxlength="500" disabled></textarea>
                </div>
                <button id="sendBtn" class="send-btn" disabled>
                    <span>&#10132;</span>
                </button>
                <button id="micBtn" class="send-btn mic-btn" style="display:none">
                    <span>&#127908;</span>
                </button>
            </div>
        </div>

        <!-- Меню -->
        <div id="menuDropdown" class="dropdown" style="display:none">
            <button class="dropdown-item" data-action="settings">Settings</button>
            <button class="dropdown-item" data-action="clear-chat">Clear Chat</button>
            <button class="dropdown-item" data-action="delete-mode">Delete Messages</button>
            <button class="dropdown-item" data-action="export">Export History</button>
        </div>

        <div id="attachMenu" class="dropdown" style="display:none">
            <button class="dropdown-item" data-action="photo">Photo</button>
            <button class="dropdown-item" data-action="video">Video</button>
            <button class="dropdown-item" data-action="file">File</button>
            <button class="dropdown-item" data-action="camera">Camera</button>
            <button class="dropdown-item" data-action="poll">Poll</button>
            <button class="dropdown-item" data-action="quiz">Quiz</button>
        </div>

        <div id="contextMenu" class="dropdown" style="display:none"></div>

        <div id="mediaViewer" class="overlay" style="display:none">
            <button id="closeViewer" class="close-btn">&#10005;</button>
            <button id="viewerMenu" class="close-btn" style="right:60px">&#8942;</button>
            <div id="mediaContent"></div>
        </div>

        <div id="settingsPage" class="page" style="display:none"></div>
        <div id="profileModal" class="overlay" style="display:none"></div>

        <div id="linkModal" class="overlay" style="display:none">
            <div class="modal">
                <h3>External Link</h3>
                <p>Are you sure you want to open this link?</p>
                <p id="linkUrl" class="link-text"></p>
                <div style="display:flex;gap:8px">
                    <button id="openLink" class="btn-primary">Open</button>
                    <button id="cancelLink" class="btn-secondary">Cancel</button>
                </div>
            </div>
        </div>

        <div id="deleteModal" class="overlay" style="display:none">
            <div class="modal">
                <h3>Delete Messages</h3>
                <p id="deleteCount"></p>
                <div style="display:flex;gap:8px">
                    <button id="confirmDelete" class="btn-danger">Delete</button>
                    <button id="cancelDelete" class="btn-secondary">Cancel</button>
                </div>
            </div>
        </div>

        <div id="reportModal" class="overlay" style="display:none"></div>
        <div id="pollModal" class="overlay" style="display:none"></div>
        <div id="toast" class="toast"></div>
    </div>

    <input type="file" id="fileInput" style="display:none" multiple>
    <input type="file" id="photoInput" style="display:none" accept="image/*" multiple>
    <input type="file" id="videoInput" style="display:none" accept="video/*" multiple>
    <input type="file" id="cameraInput" style="display:none" accept="image/*,video/*" capture="environment">

    <!-- EmailJS -->
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

    <script src="assets/js/utils.js"></script>
    <script src="assets/js/translate.js"></script>
    <script src="assets/js/notifications.js"></script>
    <script src="assets/js/websocket.js"></script>
    <script src="assets/js/markdown.js"></script>
    <script src="assets/js/media.js"></script>
    <script src="assets/js/voice.js"></script>
    <script src="assets/js/polls.js"></script>
    <script src="assets/js/contextMenu.js"></script>
    <script src="assets/js/profile.js"></script>
    <script src="assets/js/search.js"></script>
    <script src="assets/js/settings.js"></script>
    <script src="assets/js/reports.js"></script>
    <script src="assets/js/chat.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
