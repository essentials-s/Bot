<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Всемирный чат</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
            background:#0a0e17;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            color:#fff;
        }
        .chat{
            width:100%;
            max-width:550px;
            height:100vh;
            background:#111827;
            display:flex;
            flex-direction:column;
            border:1px solid #1f2937;
        }
        @media(min-width:560px){.chat{height:95vh;border-radius:20px}}
        .header{
            padding:14px 18px;
            background:#1a2332;
            border-bottom:1px solid #1f2937;
            display:flex;
            align-items:center;
            gap:10px;
        }
        .header .icon{font-size:24px}
        .header-info{flex:1}
        .header-info h3{font-size:15px;font-weight:600}
        .header-info span{font-size:11px;color:#9ca3af}
        .online-count{background:#1f2937;padding:4px 10px;border-radius:12px;font-size:12px;color:#10b981}
        .messages{
            flex:1;
            overflow-y:auto;
            padding:14px;
            display:flex;
            flex-direction:column;
            gap:6px;
        }
        .msg-group{margin-bottom:4px}
        .msg-group .author{
            font-size:11px;
            font-weight:600;
            margin-bottom:2px;
            padding-left:4px;
        }
        .msg-row{display:flex;gap:6px;align-items:flex-end}
        .bubble{
            max-width:80%;
            padding:8px 12px;
            border-radius:14px;
            font-size:13px;
            line-height:1.4;
            word-break:break-word;
            background:#1f2937;
            border:1px solid #2d3748;
        }
        .bubble .reply-preview{
            font-size:10px;
            padding:3px 6px;
            margin-bottom:4px;
            border-left:2px solid #3b82f6;
            background:rgba(0,0,0,0.3);
            border-radius:3px;
            color:#9ca3af;
        }
        .bubble .reply-preview strong{color:#60a5fa}
        .bubble .time{font-size:9px;opacity:0.4;text-align:right;margin-top:3px}
        .system-msg{
            text-align:center;
            font-size:11px;
            color:#6b7280;
            padding:8px 0;
        }
        .input-area{
            padding:10px 14px 14px;
            border-top:1px solid #1f2937;
            display:flex;
            gap:8px;
            align-items:flex-end;
        }
        .input-box{
            flex:1;
            background:#1f2937;
            border-radius:22px;
            padding:2px 4px 2px 14px;
            border:1px solid #2d3748;
            display:flex;
            align-items:flex-end;
        }
        .input-box:focus-within{border-color:#3b82f6}
        textarea{
            flex:1;
            background:transparent;
            border:none;
            color:#fff;
            font-size:13px;
            padding:8px 0;
            resize:none;
            max-height:100px;
            outline:none;
            font-family:inherit;
            line-height:1.4;
        }
        textarea::placeholder{color:#6b7280}
        .send-btn{
            width:40px;
            height:40px;
            border-radius:50%;
            background:#3b82f6;
            border:none;
            cursor:pointer;
            display:flex;
            align-items:center;
            justify-content:center;
            transition:.2s;
        }
        .send-btn:disabled{opacity:0.3}
        .send-btn:active{transform:scale(0.9)}
        .send-btn svg{width:18px;height:18px}
        .toast{
            position:fixed;
            top:16px;
            left:50%;
            transform:translateX(-50%) translateY(-120px);
            background:#1f2937;
            border:1px solid #374151;
            padding:8px 18px;
            border-radius:20px;
            font-size:12px;
            z-index:100;
            transition:.3s;
        }
        .toast.show{transform:translateX(-50%) translateY(0)}
        .name-input{
            background:#1f2937;
            border:1px solid #2d3748;
            color:#fff;
            padding:6px 12px;
            border-radius:8px;
            font-size:13px;
            width:100px;
            outline:none;
        }
        .name-input:focus{border-color:#3b82f6}
    </style>
</head>
<body>
    <div class="chat">
        <div class="header">
            <div class="icon">🌍</div>
            <div class="header-info">
                <h3>Всемирный чат</h3>
                <span>Все сообщения видны всем</span>
            </div>
            <div class="online-count" id="onlineCount">● 1 онлайн</div>
        </div>
        <div class="messages" id="messages"></div>
        <div class="input-area">
            <input class="name-input" id="nameInput" placeholder="Имя" maxlength="20">
            <div class="input-box">
                <textarea id="msgInput" placeholder="Сообщение..." rows="1" maxlength="500"></textarea>
            </div>
            <button class="send-btn" id="sendBtn" disabled>
                <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            </button>
        </div>
    </div>
    <div class="toast" id="toast"></div>

    <script>
        // ===== БЕСПЛАТНОЕ ХРАНИЛИЩЕ =====
        const BLOB_ID = '1352058235041792000'; // Единый для всех
        const API = 'https://jsonblob.com/api/jsonBlob/' + BLOB_ID;

        let messages = [];
        let userName = localStorage.getItem('chat_name') || '';

        // ===== DOM =====
        const messagesEl = document.getElementById('messages');
        const msgInput = document.getElementById('msgInput');
        const nameInput = document.getElementById('nameInput');
        const sendBtn = document.getElementById('sendBtn');
        const onlineCount = document.getElementById('onlineCount');
        const toastEl = document.getElementById('toast');

        if (userName) nameInput.value = userName;

        // ===== ЗАГРУЗКА СООБЩЕНИЙ =====
        async function loadMessages() {
            try {
                const res = await fetch(API);
                const data = await res.json();
                messages = data.messages || [];
                onlineCount.textContent = '● ' + (data.online || 1) + ' онлайн';
                renderAll();
                scrollToBottom(false);
            } catch (e) {
                // Если blob не существует - создаем
                await fetch(API, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ messages: [], online: 1 })
                });
            }
        }

        async function saveMessages() {
            const online = Math.floor(Math.random() * 5) + 1; // Имитация онлайна
            await fetch(API, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ messages, online })
            });
        }

        // ===== РЕНДЕР =====
        function renderAll() {
            messagesEl.innerHTML = '';
            if (messages.length === 0) {
                messagesEl.innerHTML = '<div class="system-msg">💬 Пока нет сообщений. Будьте первым!</div>';
                return;
            }

            let lastAuthor = '';
            let lastTime = 0;

            messages.forEach((msg, i) => {
                // Системные сообщения
                if (msg.system) {
                    const div = document.createElement('div');
                    div.className = 'system-msg';
                    div.textContent = msg.text;
                    messagesEl.appendChild(div);
                    lastAuthor = '';
                    return;
                }

                // Группировка сообщений от одного автора (в течение 2 минут)
                const showAuthor = msg.name !== lastAuthor || (msg.time - lastTime) > 120000;

                if (showAuthor) {
                    const group = document.createElement('div');
                    group.className = 'msg-group';
                    group.innerHTML = `<div class="author" style="color:${getColor(msg.name)}">${esc(msg.name)}</div>`;
                    messagesEl.appendChild(group);
                }

                const row = document.createElement('div');
                row.className = 'msg-row';

                let replyHTML = '';
                if (msg.replyTo !== undefined && msg.replyTo !== null && messages[msg.replyTo]) {
                    const replied = messages[msg.replyTo];
                    replyHTML = `<div class="reply-preview"><strong>${esc(replied.name)}</strong>: ${esc(replied.text).substring(0,40)}</div>`;
                }

                row.innerHTML = `<div class="bubble">${replyHTML}${esc(msg.text).replace(/\n/g,'<br>')}<div class="time">${formatTime(msg.time)}</div></div>`;

                // Добавляем в последнюю группу или создаем новую
                const groups = messagesEl.querySelectorAll('.msg-group');
                const lastGroup = groups[groups.length - 1];
                if (lastGroup && !showAuthor) {
                    lastGroup.appendChild(row);
                } else if (lastGroup) {
                    lastGroup.appendChild(row);
                }

                lastAuthor = msg.name;
                lastTime = msg.time;
            });
        }

        // ===== ОТПРАВКА =====
        async function send() {
            const text = msgInput.value.trim();
            const name = nameInput.value.trim() || 'Гость';

            if (!text) return;

            localStorage.setItem('chat_name', name);
            userName = name;

            messages.push({
                id: Date.now(),
                name: name,
                text: text,
                time: Date.now(),
                replyTo: null
            });

            await saveMessages();
            msgInput.value = '';
            sendBtn.disabled = true;
            renderAll();
            scrollToBottom(true);
        }

        // ===== ПРОВЕРКА НОВЫХ =====
        let lastMsgCount = 0;
        async function checkNew() {
            try {
                const res = await fetch(API);
                const data = await res.json();
                const newMsgs = data.messages || [];
                onlineCount.textContent = '● ' + (data.online || 1) + ' онлайн';

                if (newMsgs.length !== lastMsgCount) {
                    messages = newMsgs;
                    renderAll();
                    scrollToBottom(true);
                    if (newMsgs.length > lastMsgCount && lastMsgCount > 0) {
                        showToast('📩 Новое сообщение');
                    }
                    lastMsgCount = newMsgs.length;
                }
            } catch (e) {}
        }

        // ===== УТИЛИТЫ =====
        function scrollToBottom(smooth) {
            messagesEl.scrollTo({ top: messagesEl.scrollHeight, behavior: smooth ? 'smooth' : 'instant' });
        }

        function showToast(text) {
            toastEl.textContent = text;
            toastEl.classList.add('show');
            setTimeout(() => toastEl.classList.remove('show'), 2000);
        }

        function formatTime(ts) {
            const d = new Date(ts);
            return d.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
        }

        function esc(s) {
            const d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }

        function getColor(name) {
            let hash = 0;
            for (let i = 0; i < name.length; i++) {
                hash = name.charCodeAt(i) + ((hash << 5) - hash);
            }
            const hue = Math.abs(hash) % 360;
            return `hsl(${hue},60%,65%)`;
        }

        // ===== СОБЫТИЯ =====
        msgInput.addEventListener('input', () => {
            sendBtn.disabled = !msgInput.value.trim();
        });

        msgInput.addEventListener('keydown', e => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                if (!sendBtn.disabled) send();
            }
        });

        sendBtn.addEventListener('click', send);
        nameInput.addEventListener('change', () => {
            localStorage.setItem('chat_name', nameInput.value.trim());
        });

        // ===== СТАРТ =====
        loadMessages().then(() => {
            lastMsgCount = messages.length;
        });
        setInterval(checkNew, 1500);
    </script>
</body>
</html>
