<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Чат поддержки</title>
    <style>
        :root {
            --bg: #0f1724;
            --surface: #182533;
            --surface2: #1e2e3e;
            --primary: #5eb5f7;
            --primary-glow: rgba(94, 181, 247, 0.15);
            --text: #e8edf3;
            --text2: #95a5b8;
            --accent: #f7a85e;
            --danger: #f75e5e;
            --border: #253545;
            --radius: 16px;
            --radius-sm: 10px;
            --shadow: 0 4px 24px rgba(0,0,0,0.3);
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
        }

        /* ====== ЧАТ-КОНТЕЙНЕР ====== */
        .chat-container {
            width: 100%;
            max-width: 480px;
            height: 100vh;
            height: 100dvh;
            background: var(--surface);
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        @media (min-width: 500px) {
            .chat-container {
                height: 90vh;
                height: 90dvh;
                max-height: 800px;
                border-radius: var(--radius);
                margin: 0 12px;
            }
        }

        /* ====== ХЕДЕР ====== */
        .chat-header {
            padding: 16px 20px;
            background: var(--surface2);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
            position: relative;
            z-index: 2;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), #3a7bd5);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 18px;
            color: #fff;
            flex-shrink: 0;
            box-shadow: 0 0 20px var(--primary-glow);
        }

        .header-info {
            flex: 1;
            min-width: 0;
        }
        .header-name {
            font-weight: 600;
            font-size: 16px;
            letter-spacing: -0.2px;
        }
        .header-status {
            font-size: 12px;
            color: var(--text2);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .status-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #4caf84;
            box-shadow: 0 0 8px rgba(76, 175, 132, 0.6);
            animation: pulse-dot 2s infinite;
        }
        .status-dot.offline {
            background: #888;
            box-shadow: none;
            animation: none;
        }
        @keyframes pulse-dot {
            0%,
            100% {
                box-shadow: 0 0 4px rgba(76, 175, 132, 0.4);
            }
            50% {
                box-shadow: 0 0 14px rgba(76, 175, 132, 0.8);
            }
        }

        /* ====== СООБЩЕНИЯ ====== */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px 16px 8px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            scroll-behavior: smooth;
            overscroll-behavior: contain;
        }

        .messages-area::-webkit-scrollbar {
            width: 4px;
        }
        .messages-area::-webkit-scrollbar-track {
            background: transparent;
        }
        .messages-area::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        /* Дата */
        .date-divider {
            text-align: center;
            font-size: 11px;
            color: var(--text2);
            margin: 8px 0 4px;
            letter-spacing: 0.3px;
        }

        /* Сообщение */
        .msg-row {
            display: flex;
            gap: 8px;
            animation: msg-in 0.35s ease-out;
        }
        .msg-row.you {
            justify-content: flex-end;
        }
        @keyframes msg-in {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .msg-bubble {
            max-width: 82%;
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.5;
            word-break: break-word;
            position: relative;
            transition: var(--transition);
            letter-spacing: -0.1px;
        }
        .msg-row.them .msg-bubble {
            background: var(--surface2);
            border-bottom-left-radius: 6px;
            color: var(--text);
            border: 1px solid var(--border);
        }
        .msg-row.you .msg-bubble {
            background: var(--primary);
            border-bottom-right-radius: 6px;
            color: #fff;
            box-shadow: 0 2px 12px rgba(94, 181, 247, 0.25);
        }

        .msg-time {
            font-size: 10px;
            opacity: 0.7;
            margin-top: 4px;
            text-align: right;
            letter-spacing: 0.2px;
        }
        .msg-row.them .msg-time {
            color: var(--text2);
        }

        /* Системное */
        .msg-system {
            text-align: center;
            font-size: 12px;
            color: var(--text2);
            padding: 4px 0;
            font-style: italic;
            animation: msg-in 0.35s ease-out;
        }

        /* ====== ИНПУТ ====== */
        .input-area {
            padding: 10px 14px 14px;
            background: var(--surface);
            border-top: 1px solid var(--border);
            display: flex;
            gap: 8px;
            align-items: flex-end;
            flex-shrink: 0;
            position: relative;
            z-index: 2;
        }

        .input-wrapper {
            flex: 1;
            background: var(--surface2);
            border-radius: 24px;
            display: flex;
            align-items: flex-end;
            padding: 4px 6px 4px 16px;
            border: 1px solid var(--border);
            transition: var(--transition);
        }
        .input-wrapper:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-glow);
        }

        .chat-input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text);
            font-size: 14px;
            padding: 8px 0;
            resize: none;
            max-height: 120px;
            outline: none;
            font-family: inherit;
            letter-spacing: -0.1px;
            line-height: 1.4;
        }
        .chat-input::placeholder {
            color: var(--text2);
        }

        .send-btn {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: var(--primary);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            flex-shrink: 0;
            box-shadow: 0 2px 12px rgba(94, 181, 247, 0.3);
            color: #fff;
        }
        .send-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 20px rgba(94, 181, 247, 0.45);
        }
        .send-btn:active {
            transform: scale(0.94);
            transition: 0.1s;
        }
        .send-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* SVG иконка */
        .send-icon {
            width: 18px;
            height: 18px;
            margin-left: 2px;
        }

        /* ====== БЕЙДЖ НЕПРОЧИТАННЫХ (для админа) ====== */
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 12px 16px 4px;
            align-items: center;
        }
        .typing-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--text2);
            animation: bounce 1.4s infinite ease-in-out;
        }
        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }
        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }
        @keyframes bounce {
            0%,
            80%,
            100% {
                transform: translateY(0);
            }
            40% {
                transform: translateY(-8px);
            }
        }

        /* Алерт */
        .toast {
            position: absolute;
            top: 70px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--surface2);
            border: 1px solid var(--border);
            padding: 10px 20px;
            border-radius: 24px;
            font-size: 13px;
            z-index: 10;
            animation: toast-in 0.3s ease-out, toast-out 0.3s 2.5s ease-in forwards;
            pointer-events: none;
            white-space: nowrap;
        }
        @keyframes toast-in {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }
        @keyframes toast-out {
            to {
                opacity: 0;
                transform: translateX(-50%) translateY(-20px);
            }
        }

        /* Затемнение при потере связи */
        .connection-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 20;
        }
        .connection-overlay.active {
            display: flex;
        }
        .connection-box {
            background: var(--surface2);
            padding: 24px 32px;
            border-radius: var(--radius);
            text-align: center;
            border: 1px solid var(--border);
        }
        .connection-box .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 12px;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>
<body>

    <div class="chat-container">
        <!-- ХЕДЕР -->
        <div class="chat-header">
            <div class="avatar">📞</div>
            <div class="header-info">
                <div class="header-name">Поддержка</div>
                <div class="header-status" id="statusLine">
                    <span class="status-dot" id="statusDot"></span>
                    <span id="statusText">Подключаемся...</span>
                </div>
            </div>
        </div>

        <!-- СООБЩЕНИЯ -->
        <div class="messages-area" id="messagesArea">
            <div class="date-divider" id="dateDivider"></div>
            <!-- Сообщения будут тут -->
        </div>

        <!-- ИНДИКАТОР ПЕЧАТИ -->
        <div class="typing-indicator" id="typingIndicator" style="display:none;">
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
            <span style="font-size:12px;color:var(--text2);margin-left:8px;">Админ печатает...</span>
        </div>

        <!-- ПОЛЕ ВВОДА -->
        <div class="input-area">
            <div class="input-wrapper">
                <textarea
                class="chat-input"
                id="chatInput"
                placeholder="Сообщение..."
                rows="1"
                maxlength="2000"
                ></textarea>
            </div>
            <button class="send-btn" id="sendBtn" disabled>
                <svg class="send-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </div>

        <!-- ОВЕРЛЕЙ ПОДКЛЮЧЕНИЯ -->
        <div class="connection-overlay" id="connectionOverlay">
            <div class="connection-box">
                <div class="spinner"></div>
                <p>Переподключение...</p>
            </div>
        </div>
    </div>

    <script>
        // ==================== КОНФИГ ====================
        // Замени на ID своего бота (можно получить у @BotFather)
        const BOT_USERNAME = 'YOUR_BOT_USERNAME'; // без @
        // Уникальный ID чата (генерируется для этого юзера)
        // В реальном приложении — после аутентификации
        const USER_TOKEN = 'guest_' + Math.random().toString(36).substring(2, 10);
        const USER_NAME = 'Гость' + Math.floor(Math.random() * 9000 + 1000);

        // ==================== СОСТОЯНИЕ ====================
        const messages = [];
        let ws = null;
        let reconnectAttempts = 0;
        const MAX_RECONNECT_DELAY = 30000;

        // ==================== DOM ====================
        const messagesArea = document.getElementById('messagesArea');
        const chatInput = document.getElementById('chatInput');
        const sendBtn = document.getElementById('sendBtn');
        const typingIndicator = document.getElementById('typingIndicator');
        const connectionOverlay = document.getElementById('connectionOverlay');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const dateDivider = document.getElementById('dateDivider');

        // ==================== ИНИЦИАЛИЗАЦИЯ ====================
        function init() {
            updateDateDivider();
            loadDraft();
            connectWebSocket();
            setupEventListeners();
            // Загружаем историю из localStorage
            loadMessagesFromStorage();
        }

        function setupEventListeners() {
            chatInput.addEventListener('input', onInputChange);
            chatInput.addEventListener('keydown', onKeyDown);
            sendBtn.addEventListener('click', sendMessage);
            // Авто-ресize textarea
            chatInput.addEventListener('input', autoResize);
        }

        // ==================== WEB SOCKET (ЭМУЛЯЦИЯ Telegram) ====================
        function connectWebSocket() {
            // В реальном приложении здесь было бы подключение к Telegram Bot API
            // через WebSocket или Long Polling.
            // Для демо — эмулируем через localStorage и таймеры.

            updateConnectionStatus('connecting');

            // Имитация задержки подключения
            setTimeout(() => {
                updateConnectionStatus('connected');
                connectionOverlay.classList.remove('active');
                reconnectAttempts = 0;

                // Загружаем "сообщения от админа" которые пришли пока нас не было
                checkForAdminMessages();
            }, 1200);

            // Периодически проверяем новые сообщения от админа
            setInterval(checkForAdminMessages, 3000);

            // Слушаем изменения в localStorage (для сообщений от админа из другой вкладки)
            window.addEventListener('storage', (e) => {
                if (e.key === 'tg_admin_messages_' + USER_TOKEN) {
                    checkForAdminMessages();
                }
            });
        }

        function updateConnectionStatus(status) {
            switch (status) {
                case 'connecting':
                    statusDot.className = 'status-dot offline';
                    statusText.textContent = 'Подключение...';
                    sendBtn.disabled = true;
                    break;
                case 'connected':
                    statusDot.className = 'status-dot';
                    statusText.textContent = 'Онлайн';
                    sendBtn.disabled = false;
                    break;
                case 'disconnected':
                    statusDot.className = 'status-dot offline';
                    statusText.textContent = 'Нет связи';
                    sendBtn.disabled = true;
                    connectionOverlay.classList.add('active');
                    scheduleReconnect();
                    break;
            }
        }

        function scheduleReconnect() {
            const delay = Math.min(1000 * Math.pow(2, reconnectAttempts), MAX_RECONNECT_DELAY);
            reconnectAttempts++;
            setTimeout(() => {
                updateConnectionStatus('connecting');
                setTimeout(() => {
                    updateConnectionStatus('connected');
                    connectionOverlay.classList.remove('active');
                    checkForAdminMessages();
                }, 1000);
            }, delay);
        }

        // Эмуляция получения сообщений от админа
        function checkForAdminMessages() {
            const key = 'tg_admin_messages_' + USER_TOKEN;
            const raw = localStorage.getItem(key);
            if (!raw) return;

            const adminMessages = JSON.parse(raw);
            localStorage.removeItem(key); // Очищаем после получения

            adminMessages.forEach(msg => {
                // Проверяем, нет ли уже такого сообщения
                const exists = messages.find(m => m.id === msg.id);
                if (!exists) {
                    addMessage({
                        id: msg.id,
                        from: 'admin',
                        text: msg.text,
                        timestamp: msg.timestamp || Date.now(),
                    });
                }
            });

            // Показываем "печатает" на 1.5 сек если были сообщения
            if (adminMessages.length > 0) {
                showTyping(1500);
            }
        }

        // ==================== ОТПРАВКА СООБЩЕНИЯ ====================
        function sendMessage() {
            const text = chatInput.value.trim();
            if (!text) return;

            const msgId = 'msg_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5);
            const timestamp = Date.now();

            // Добавляем в локальные сообщения
            addMessage({
                id: msgId,
                from: 'user',
                text: text,
                timestamp: timestamp,
            });

            // Сохраняем в "отправленные" для админа
            saveOutgoingMessage(msgId, text, timestamp);

            // Очищаем поле
            chatInput.value = '';
            autoResize();
            saveDraft('');
            sendBtn.disabled = true;

            // Эмулируем ответ админа через 3-8 секунд (для демо)
            // В реальности админ отвечает из Telegram
            simulateAdminReply(text);
        }

        function saveOutgoingMessage(id, text, timestamp) {
            // В реальном приложении отправляем на сервер / Telegram
            // Здесь сохраняем в localStorage чтобы админ мог увидеть в админке
            const key = 'tg_user_messages_' + USER_TOKEN;
            const existing = JSON.parse(localStorage.getItem(key) || '[]');
            existing.push({ id, text, timestamp, userName: USER_NAME });
            localStorage.setItem(key, JSON.stringify(existing));

            console.log('📤 Отправлено админу:', { id, text });
        }

        // Демо: автоответы админа
        function simulateAdminReply(userText) {
            const lower = userText.toLowerCase();
            let reply = null;

            if (lower.includes('привет') || lower.includes('здравствуй')) {
                reply = 'Здравствуйте! Чем могу помочь?';
            } else if (lower.includes('спасибо')) {
                reply = 'Пожалуйста! Обращайтесь ещё.';
            } else if (lower.includes('время') || lower.includes('часов')) {
                reply = 'Точное время: ' + new Date().toLocaleTimeString('ru-RU');
            } else if (lower.includes('погода')) {
                reply = '🌤 К сожалению, я не могу проверить погоду. Но администратор скоро ответит!';
            }

            if (reply) {
                const delay = 1500 + Math.random() * 3000;
                showTyping(delay);
                setTimeout(() => {
                    addMessage({
                        id: 'admin_' + Date.now(),
                        from: 'admin',
                        text: reply,
                        timestamp: Date.now(),
                    });
                    hideTyping();
                }, delay);
            }
        }

        function showTyping(duration) {
            typingIndicator.style.display = 'flex';
            if (duration) {
                clearTimeout(showTyping._timeout);
                showTyping._timeout = setTimeout(hideTyping, duration);
            }
        }

        function hideTyping() {
            typingIndicator.style.display = 'none';
        }

        // ==================== ОТОБРАЖЕНИЕ СООБЩЕНИЙ ====================
        function addMessage(msg) {
            // Проверка дубликата
            if (messages.find(m => m.id === msg.id)) return;

            messages.push(msg);
            saveMessagesToStorage();
            renderMessage(msg);
            scrollToBottom();
        }

        function renderMessage(msg) {
            const isYou = msg.from === 'user';
            const time = formatTime(msg.timestamp);

            // Проверяем, нужен ли разделитель даты
            checkDateDivider(msg.timestamp);

            const row = document.createElement('div');
            row.className = 'msg-row ' + (isYou ? 'you' : 'them');

            row.innerHTML = `
            <div class="msg-bubble">
            ${escapeHtml(msg.text)}
            <div class="msg-time">${time}</div>
            </div>
            `;

            messagesArea.appendChild(row);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML.replace(/\n/g, '<br>');
        }

        function formatTime(timestamp) {
            const d = new Date(timestamp);
            return d.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
        }

        function formatDate(timestamp) {
            const d = new Date(timestamp);
            const today = new Date();
            const yesterday = new Date(today);
            yesterday.setDate(yesterday.getDate() - 1);

            if (d.toDateString() === today.toDateString()) return 'Сегодня';
            if (d.toDateString() === yesterday.toDateString()) return 'Вчера';
            return d.toLocaleDateString('ru-RU', { day: 'numeric', month: 'long', year: 'numeric' });
        }

        function updateDateDivider() {
            dateDivider.textContent = formatDate(Date.now());
        }

        let lastRenderedDate = '';
        function checkDateDivider(timestamp) {
            const dateStr = formatDate(timestamp);
            if (dateStr !== lastRenderedDate) {
                lastRenderedDate = dateStr;
                const divider = document.createElement('div');
                divider.className = 'date-divider';
                divider.textContent = dateStr;
                messagesArea.appendChild(divider);
            }
        }

        function scrollToBottom() {
            requestAnimationFrame(() => {
                messagesArea.scrollTop = messagesArea.scrollHeight;
            });
        }

        // ==================== СОХРАНЕНИЕ ИСТОРИИ ====================
        function saveMessagesToStorage() {
            try {
                const key = 'chat_history_' + USER_TOKEN;
                // Храним последние 200 сообщений
                const toSave = messages.slice(-200);
                localStorage.setItem(key, JSON.stringify(toSave));
            } catch (e) {
                console.warn('Не удалось сохранить историю');
            }
        }

        function loadMessagesFromStorage() {
            try {
                const key = 'chat_history_' + USER_TOKEN;
                const raw = localStorage.getItem(key);
                if (raw) {
                    const saved = JSON.parse(raw);
                    saved.forEach(msg => {
                        messages.push(msg);
                        renderMessage(msg);
                    });
                    scrollToBottom();
                }
            } catch (e) {
                console.warn('Не удалось загрузить историю');
            }
        }

        // ==================== ЧЕРНОВИК ====================
        function saveDraft(text) {
            localStorage.setItem('chat_draft_' + USER_TOKEN, text);
        }

        function loadDraft() {
            const draft = localStorage.getItem('chat_draft_' + USER_TOKEN);
            if (draft) {
                chatInput.value = draft;
                autoResize();
                sendBtn.disabled = false;
            }
        }

        // ==================== ХЕЛПЕРЫ ====================
        function onInputChange() {
            const text = chatInput.value.trim();
            sendBtn.disabled = !text;
            saveDraft(text);
        }

        function onKeyDown(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                if (!sendBtn.disabled) {
                    sendMessage();
                }
            }
        }

        function autoResize() {
            chatInput.style.height = 'auto';
            chatInput.style.height = Math.min(chatInput.scrollHeight, 120) + 'px';
        }

        // ==================== ТОСТЫ ====================
        function showToast(text) {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();

            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = text;
            document.querySelector('.chat-container').appendChild(toast);

            setTimeout(() => toast.remove(), 3000);
        }

        // ==================== ЭКСПОРТ ДЛЯ АДМИНКИ ====================
        // Функция для получения сообщений (вызывается из админ-панели)
        window.getUserMessages = function() {
            const key = 'tg_user_messages_' + USER_TOKEN;
            return JSON.parse(localStorage.getItem(key) || '[]');
        };

        // Функция для отправки сообщения от админа (вызывается из админ-панели)
        window.sendAdminMessage = function(text) {
            const msgId = 'admin_' + Date.now();
            const timestamp = Date.now();

            // Сохраняем для получения пользователем
            const key = 'tg_admin_messages_' + USER_TOKEN;
            const existing = JSON.parse(localStorage.getItem(key) || '[]');
            existing.push({ id: msgId, text, timestamp });
            localStorage.setItem(key, JSON.stringify(existing));

            // Добавляем сразу в чат
            addMessage({
                id: msgId,
                from: 'admin',
                text: text,
                timestamp: timestamp,
            });

            showToast('📩 Новое сообщение от поддержки');
        };

        // ==================== СТАРТ ====================
        init();
        console.log('💬 Чат поддержки готов. USER_TOKEN:', USER_TOKEN);
        console.log('📋 Админ может отправлять сообщения через: window.sendAdminMessage("текст")');
        console.log('📋 Сообщения пользователя: window.getUserMessages()');
    </script>
</body>
  </html>
