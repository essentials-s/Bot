<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Чат поддержки</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
            background:#0a0e17;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            color:#fff;
        }
        .chat{
            width:100%;
            max-width:500px;
            height:100vh;
            background:#111827;
            display:flex;
            flex-direction:column;
            border:1px solid #1f2937;
        }
        @media(min-width:520px){
            .chat{height:95vh;border-radius:20px;margin:0 12px}
        }
        .header{
            padding:16px 20px;
            background:#1a2332;
            border-bottom:1px solid #1f2937;
            display:flex;
            align-items:center;
            gap:12px;
        }
        .avatar{
            width:42px;height:42px;border-radius:50%;
            background:linear-gradient(135deg,#3b82f6,#6366f1);
            display:flex;align-items:center;justify-content:center;font-size:20px;
        }
        .header-info h3{font-size:16px;}
        .header-info span{font-size:12px;color:#10b981;}
        .messages{
            flex:1;overflow-y:auto;padding:16px;
            display:flex;flex-direction:column;gap:8px;
        }
        .msg{display:flex;animation:slide 0.3s ease;}
        @keyframes slide{from{opacity:0;transform:translateY(15px)}}
        .msg.user{justify-content:flex-end}
        .bubble{
            max-width:80%;padding:10px 14px;border-radius:16px;
            font-size:14px;line-height:1.5;word-break:break-word;
        }
        .msg.admin .bubble{background:#1f2937;border:1px solid #374151;border-bottom-left-radius:4px}
        .msg.user .bubble{background:#2563eb;border-bottom-right-radius:4px}
        .bubble .time{font-size:10px;opacity:0.5;text-align:right;margin-top:4px}
        .input-area{
            padding:12px 16px;border-top:1px solid #1f2937;
            display:flex;gap:10px;align-items:flex-end;
        }
        .input-box{
            flex:1;background:#1f2937;border-radius:24px;
            padding:4px 6px 4px 16px;border:1px solid #374151;
            display:flex;align-items:flex-end;
        }
        textarea{
            flex:1;background:transparent;border:none;color:#fff;
            font-size:14px;padding:8px 0;resize:none;max-height:120px;
            outline:none;font-family:inherit;line-height:1.4;
        }
        textarea::placeholder{color:#6b7280}
        .send-btn{
            width:44px;height:44px;border-radius:50%;background:#3b82f6;
            border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;
        }
        .send-btn:disabled{opacity:0.3}
        .send-btn:active{transform:scale(0.9)}
        .typing{
            display:none;padding:8px 16px;align-items:center;gap:4px;
        }
        .typing .dots{
            display:flex;gap:3px;background:#1f2937;
            padding:10px 16px;border-radius:16px;
        }
        .typing .dots span{
            width:6px;height:6px;border-radius:50%;background:#6b7280;
            animation:bounce 1.4s infinite;
        }
        .typing .dots span:nth-child(2){animation-delay:0.2s}
        .typing .dots span:nth-child(3){animation-delay:0.4s}
        @keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-6px)}}
        .toast{
            position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-100px);
            background:#1f2937;border:1px solid #374151;padding:10px 20px;
            border-radius:24px;font-size:13px;z-index:100;transition:0.3s;
        }
        .toast.show{transform:translateX(-50%) translateY(0)}
        .offline{color:#ef4444!important}
    </style>
</head>
<body>
    <div class="chat">
        <div class="header">
            <div class="avatar">💬</div>
            <div class="header-info">
                <h3>Поддержка</h3>
                <span id="status">● Подключение...</span>
            </div>
        </div>
        <div class="messages" id="messages"></div>
        <div class="typing" id="typing">
            <div class="dots"><span></span><span></span><span></span></div>
        </div>
        <div class="input-area">
            <div class="input-box">
                <textarea id="input" placeholder="Сообщение..." rows="1"></textarea>
            </div>
            <button class="send-btn" id="sendBtn" disabled>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            </button>
        </div>
    </div>
    <div class="toast" id="toast"></div>

    <script>
        // ===== КОНФИГ =====
        const CHAT_ID = 'chat_' + (new URLSearchParams(location.search).get('id') || 'demo');
        const API = 'https://jsonblob.com/api/jsonBlob'; // Бесплатное хранилище JSON

        let blobId = localStorage.getItem('blob_' + CHAT_ID);
        let messages = [];
        let lastCheck = Date.now();

        // ===== DOM =====
        const messagesEl = document.getElementById('messages');
        const input = document.getElementById('input');
        const sendBtn = document.getElementById('sendBtn');
        const typingEl = document.getElementById('typing');
        const statusEl = document.getElementById('status');
        const toastEl = document.getElementById('toast');

        // ===== ЗАГРУЗКА =====
        async function loadMessages() {
            if (!blobId) {
                // Создаем новый blob
                const res = await fetch(API, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ messages: [], chat_id: CHAT_ID, created: Date.now() })
                });
                const data = await res.json();
                blobId = data.id;
                localStorage.setItem('blob_' + CHAT_ID, blobId);
            }

            const res = await fetch(API + '/' + blobId);
            const data = await res.json();
            messages = data.messages || [];
            renderAll();
            scrollToBottom(false);
            statusEl.textContent = '● Онлайн';
        }

        async function saveMessages() {
            await fetch(API + '/' + blobId, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ messages, chat_id: CHAT_ID, updated: Date.now() })
            });
        }

        // ===== РЕНДЕР =====
        function renderAll() {
            messagesEl.innerHTML = '';
            messages.forEach(m => renderMessage(m));
        }

        function renderMessage(msg) {
            const div = document.createElement('div');
            div.className = 'msg ' + (msg.from === 'user' ? 'user' : 'admin');
            div.innerHTML = `<div class="bubble">${msg.text.replace(/\n/g,'<br>')}<div class="time">${new Date(msg.time).toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'})}</div></div>`;
            messagesEl.appendChild(div);
        }

        // ===== ОТПРАВКА =====
        async function send() {
            const text = input.value.trim();
            if (!text) return;

            const msg = { id: Date.now(), from: 'user', text, time: Date.now() };
            messages.push(msg);
            renderAll();
            scrollToBottom(true);
            await saveMessages();

            input.value = '';
            sendBtn.disabled = true;
            showToast('✅ Отправлено');
        }

        // ===== ПРОВЕРКА НОВЫХ =====
        async function checkNew() {
            if (!blobId) return;
            const res = await fetch(API + '/' + blobId);
            const data = await res.json();
            const newMsgs = (data.messages || []).filter(m => m.time > lastCheck);
            if (newMsgs.length > 0) {
                messages = data.messages;
                renderAll();
                scrollToBottom(true);
                showToast('📩 Новое сообщение');
            }
            lastCheck = Date.now();
        }

        // ===== УТИЛИТЫ =====
        function scrollToBottom(smooth) {
            messagesEl.scrollTo({ top: messagesEl.scrollHeight, behavior: smooth ? 'smooth' : 'instant' });
        }

        function showToast(text) {
            toastEl.textContent = text;
            toastEl.classList.add('show');
            setTimeout(() => toastEl.classList.remove('show'), 2500);
        }

        input.addEventListener('input', () => {
            sendBtn.disabled = !input.value.trim();
        });

        input.addEventListener('keydown', e => {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault();
                send(); }
        });

        sendBtn.addEventListener('click', send);

        // ===== СТАРТ =====
        loadMessages();
        setInterval(checkNew, 2000);
    </script>
</body>
  </html>
