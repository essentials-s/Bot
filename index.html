<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Всемирный чат</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
            background:#0a0e17;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            color:#fff;
        }
        .app{
            width:100%;
            max-width:550px;
            height:100vh;
            position:relative;
            overflow:hidden;
        }
        @media(min-width:560px){.app{height:95vh;border-radius:16px;border:1px solid #1f2937;background:#111827}}
        .page{
            position:absolute;
            inset:0;
            display:flex;
            flex-direction:column;
            transition:.3s;
        }
        .page.chat-page{transform:translateX(0)}
        .page.admin-page{transform:translateX(100%)}
        .page.admin-page.show{transform:translateX(0)}
        .header{
            padding:12px 16px;
            background:#1a2332;
            border-bottom:1px solid #1f2937;
            display:flex;
            align-items:center;
            gap:10px;
            flex-shrink:0;
        }
        .header .icon{font-size:22px}
        .header-info{flex:1}
        .header-info h3{font-size:14px;font-weight:600}
        .header-info span{font-size:10px;color:#9ca3af}
        .badge{
            background:#1f2937;
            padding:4px 10px;
            border-radius:10px;
            font-size:11px;
            color:#10b981;
        }
        .messages{
            flex:1;
            overflow-y:auto;
            padding:12px;
            display:flex;
            flex-direction:column;
            gap:4px;
        }
        .msg{margin-bottom:2px}
        .msg .m-name{
            font-size:10px;
            font-weight:600;
            padding-left:4px;
            margin-bottom:2px;
        }
        .bubble{
            display:inline-block;
            max-width:85%;
            padding:7px 11px;
            border-radius:12px;
            font-size:13px;
            line-height:1.4;
            word-break:break-word;
            background:#1f2937;
        }
        .bubble .reply{
            font-size:10px;
            padding:2px 6px;
            margin-bottom:4px;
            border-left:2px solid #3b82f6;
            background:rgba(0,0,0,0.3);
            border-radius:3px;
            color:#9ca3af;
        }
        .bubble .reply b{color:#60a5fa}
        .bubble .t{font-size:9px;opacity:0.3;text-align:right;margin-top:2px}
        .sys{text-align:center;font-size:10px;color:#6b7280;padding:6px 0}
        .input-row{
            padding:10px 14px;
            border-top:1px solid #1f2937;
            display:flex;
            gap:6px;
            align-items:flex-end;
            flex-shrink:0;
        }
        .input-row input.name{
            width:80px;
            background:#1f2937;
            border:1px solid #2d3748;
            color:#fff;
            padding:7px 10px;
            border-radius:8px;
            font-size:12px;
            outline:none;
            flex-shrink:0;
        }
        .input-row input.name:focus{border-color:#3b82f6}
        .input-box{
            flex:1;
            background:#1f2937;
            border-radius:20px;
            padding:2px 4px 2px 12px;
            border:1px solid #2d3748;
            display:flex;
            align-items:flex-end;
        }
        .input-box:focus-within{border-color:#3b82f6}
        .input-box input{
            flex:1;
            background:transparent;
            border:none;
            color:#fff;
            font-size:13px;
            padding:7px 0;
            outline:none;
            font-family:inherit;
        }
        .input-box input::placeholder{color:#6b7280}
        .btn{
            width:38px;
            height:38px;
            border-radius:50%;
            background:#3b82f6;
            border:none;
            cursor:pointer;
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:18px;
            flex-shrink:0;
        }
        .btn:disabled{opacity:0.3}
        .btn:active{transform:scale(0.9)}
        .admin-toggle{
            position:fixed;
            bottom:12px;
            right:12px;
            width:44px;
            height:44px;
            border-radius:50%;
            background:#1f2937;
            border:1px solid #374151;
            color:#fff;
            cursor:pointer;
            font-size:18px;
            z-index:10;
            display:flex;
            align-items:center;
            justify-content:center;
        }
        .admin-toggle:active{background:#374151}
        .admin-list{flex:1;overflow-y:auto;padding:10px}
        .admin-item{
            background:#1a2332;
            border:1px solid #2d3748;
            border-radius:10px;
            padding:10px 12px;
            margin-bottom:8px;
        }
        .admin-item .a-header{
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:4px;
        }
        .admin-item .a-name{font-weight:600;font-size:12px}
        .admin-item .a-time{font-size:9px;color:#6b7280}
        .admin-item .a-text{font-size:13px;margin-bottom:6px;line-height:1.4}
        .admin-item .a-reply{font-size:10px;color:#60a5fa;margin-bottom:4px;display:none}
        .admin-item .a-reply.show{display:block}
        .admin-item .reply-row{display:none;gap:6px;margin-top:6px}
        .admin-item .reply-row.active{display:flex}
        .admin-item .reply-row input{
            flex:1;
            background:#1f2937;
            border:1px solid #374151;
            color:#fff;
            padding:6px 10px;
            border-radius:6px;
            font-size:12px;
            outline:none;
        }
        .admin-item .reply-row input:focus{border-color:#3b82f6}
        .admin-item .reply-row .r-btn{
            background:#10b981;
            border:none;
            color:#fff;
            padding:6px 10px;
            border-radius:6px;
            cursor:pointer;
            font-size:12px;
            white-space:nowrap;
        }
        .admin-item .reply-row .c-btn{background:#374151}
        .admin-item .open-reply{
            background:#2563eb;
            border:none;
            color:#fff;
            padding:4px 10px;
            border-radius:5px;
            cursor:pointer;
            font-size:11px;
        }
        .admin-item .open-reply:hover{background:#1d4ed8}
        .toast{
            position:fixed;
            top:16px;
            left:50%;
            transform:translateX(-50%) translateY(-120px);
            background:#1f2937;
            border:1px solid #374151;
            padding:8px 16px;
            border-radius:20px;
            font-size:11px;
            z-index:100;
            transition:.3s;
            pointer-events:none;
        }
        .toast.show{transform:translateX(-50%) translateY(0)}
    </style>
</head>
<body>
    <div class="app">
        <!-- СТРАНИЦА ЧАТА -->
        <div class="page chat-page" id="chatPage">
            <div class="header">
                <div class="icon">🌍</div>
                <div class="header-info">
                    <h3>Всемирный чат</h3>
                    <span>Все сообщения видны всем</span>
                </div>
                <div class="badge" id="onlineBadge">● онлайн</div>
            </div>
            <div class="messages" id="chatMessages"></div>
            <div class="input-row">
                <input class="name" id="nameInput" placeholder="Имя" maxlength="15">
                <div class="input-box">
                    <input id="msgInput" placeholder="Сообщение..." maxlength="500">
                </div>
                <button class="btn" id="sendBtn" disabled>➤</button>
            </div>
        </div>

        <!-- СТРАНИЦА АДМИНА -->
        <div class="page admin-page" id="adminPage">
            <div class="header">
                <div class="icon">🛡️</div>
                <div class="header-info">
                    <h3>Админ-панель</h3>
                    <span>Управление сообщениями</span>
                </div>
                <div class="badge" id="adminOnline">● 0</div>
            </div>
            <div class="admin-list" id="adminList"></div>
            <div style="padding:8px 14px;border-top:1px solid #1f2937">
                <button class="open-reply" onclick="toggleAdmin()" style="width:100%;padding:10px">
                    ← Вернуться в чат
                </button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>
    <button class="admin-toggle" id="adminToggle" onclick="toggleAdmin()" title="Админ">⚙</button>

    <script>
        // ===== ХРАНИЛИЩЕ (бесплатный JSON Blob) =====
        const BLOB_ID = '1352058235041792000';
        const API = 'https://jsonblob.com/api/jsonBlob/' + BLOB_ID;
        const ADMIN_PASS = 'admin123'; // Пароль для входа в админку

        let messages = [];
        let isAdmin = false;
        let userName = localStorage.getItem('chat_name') || '';
        let activeReplyIndex = null;

        // ===== DOM =====
        const chatPage = document.getElementById('chatPage');
        const adminPage = document.getElementById('adminPage');
        const chatMessages = document.getElementById('chatMessages');
        const adminList = document.getElementById('adminList');
        const msgInput = document.getElementById('msgInput');
        const nameInput = document.getElementById('nameInput');
        const sendBtn = document.getElementById('sendBtn');
        const onlineBadge = document.getElementById('onlineBadge');
        const adminOnline = document.getElementById('adminOnline');
        const adminToggle = document.getElementById('adminToggle');
        const toastEl = document.getElementById('toast');

        if (userName) nameInput.value = userName;

        // ===== API =====
        async function loadData() {
            try {
                const res = await fetch(API);
                const data = await res.json();
                messages = data.messages || [];
                const online = data.online || 0;
                onlineBadge.textContent = '● ' + online + ' онлайн';
                adminOnline.textContent = '● ' + online;
                return data;
            } catch (e) {
                return { messages: [], online: 0 };
            }
        }

        async function saveData() {
            try {
                const res = await fetch(API);
                const data = await res.json();
                data.messages = messages;
                return await fetch(API, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
            } catch (e) {}
        }

        // ===== ЧАТ =====
        function renderChat() {
            const msgs = messages.filter(m => !m.deleted);
            if (msgs.length === 0) {
                chatMessages.innerHTML = '<div class="sys">💬 Пока нет сообщений</div>';
                return;
            }

            chatMessages.innerHTML = '';
            let lastAuthor = '';
            let lastTime = 0;

            msgs.forEach((msg, i) => {
                if (msg.system) {
                    chatMessages.innerHTML += `<div class="sys">${esc(msg.text)}</div>`;
                    lastAuthor = '';
                    return;
                }

                const showName = msg.name !== lastAuthor || (msg.time - lastTime) > 120000;

                let replyHTML = '';
                if (msg.replyTo !== null && msg.replyTo !== undefined) {
                    const replied = msgs.find(m => m.id === msg.replyTo);
                    if (replied) {
                        replyHTML = `<div class="reply"><b>${esc(replied.name)}</b>: ${esc(replied.text).substring(0,40)}</div>`;
                    }
                }

                const html = `
                <div class="msg">
                    ${showName ? `<div class="m-name" style="color:${getColor(msg.name)}">${esc(msg.name)}</div>` : ''}
                    <div class="bubble">
                        ${replyHTML}
                        ${esc(msg.text)}
                        <div class="t">${formatTime(msg.time)}</div>
                    </div>
                </div>`;

                chatMessages.innerHTML += html;
                lastAuthor = msg.name;
                lastTime = msg.time;
            });

            scrollToBottom(chatMessages);
        }

        async function sendMessage() {
            const text = msgInput.value.trim();
            const name = nameInput.value.trim() || 'Гость';
            if (!text) return;

            localStorage.setItem('chat_name', name);
            userName = name;

            messages.push({
                id: Date.now(),
                name: name,
                text: text,
                time: Date.now(),
                replyTo: null,
                deleted: false
            });

            await saveData();
            msgInput.value = '';
            sendBtn.disabled = true;
        }

        // ===== АДМИНКА =====
        function renderAdmin() {
            const visible = messages.filter(m => !m.deleted && !m.system);
            if (visible.length === 0) {
                adminList.innerHTML = '<div class="sys" style="padding:30px">📭 Нет сообщений</div>';
                return;
            }

            adminList.innerHTML = visible.map((msg, idx) => {
                const realIndex = messages.indexOf(msg);
                const hasReply = msg.replyTo !== null && msg.replyTo !== undefined;
                const replied = hasReply ? messages.find(m => m.id === msg.replyTo) : null;

                return `
                <div class="admin-item" id="adminMsg-${realIndex}">
                    <div class="a-header">
                        <span class="a-name" style="color:${getColor(msg.name)}">${esc(msg.name)}</span>
                        <span class="a-time">${formatFull(msg.time)}</span>
                    </div>
                    <div class="a-text">${esc(msg.text)}</div>
                    <div class="a-reply ${hasReply ? 'show' : ''}">
                        ${replied ? '↩️ В ответ на: ' + esc(replied.name) + ': "' + esc(replied.text).substring(0,40) + '"' : ''}
                    </div>
                    <button class="open-reply" onclick="openReplyBox(${realIndex})">↩️ Ответить</button>
                    <div class="reply-row" id="replyRow-${realIndex}">
                        <input type="text" id="replyInput-${realIndex}" placeholder="Ответ..." maxlength="500">
                        <button class="r-btn" onclick="sendAdminReply(${realIndex})">Отпр</button>
                        <button class="r-btn c-btn" onclick="closeReplyBox(${realIndex})">✕</button>
                    </div>
                </div>`;
            }).join('');

            // Фокус на активном поле
            if (activeReplyIndex !== null) {
                const input = document.getElementById('replyInput-' + activeReplyIndex);
                if (input) input.focus();
            }
        }

        function openReplyBox(index) {
            // Закрыть все другие
            document.querySelectorAll('.reply-row.active').forEach(r => r.classList.remove('active'));
            const row = document.getElementById('replyRow-' + index);
            row.classList.add('active');
            activeReplyIndex = index;
            const input = document.getElementById('replyInput-' + index);
            input.value = '';
            input.focus();
        }

        function closeReplyBox(index) {
            const row = document.getElementById('replyRow-' + index);
            row.classList.remove('active');
            activeReplyIndex = null;
        }

        async function sendAdminReply(index) {
            const input = document.getElementById('replyInput-' + index);
            const text = input.value.trim();
            if (!text) return;

            const originalMsg = messages[index];

            messages.push({
                id: Date.now(),
                name: '🛡️ Админ',
                text: text,
                time: Date.now(),
                replyTo: originalMsg.id,
                deleted: false
            });

            await saveData();
            closeReplyBox(index);
            showToast('✅ Ответ отправлен');
        }

        // ===== ПЕРЕКЛЮЧЕНИЕ =====
        function toggleAdmin() {
            if (!isAdmin) {
                const pass = prompt('Введите пароль админа:');
                if (pass !== ADMIN_PASS) {
                    showToast('❌ Неверный пароль');
                    return;
                }
                isAdmin = true;
                adminToggle.textContent = '✕';
                adminToggle.style.background = '#ef4444';
                showToast('🛡️ Админ-панель открыта');
            } else {
                isAdmin = false;
                adminToggle.textContent = '⚙';
                adminToggle.style.background = '#1f2937';
                showToast('💬 Режим чата');
            }

            if (isAdmin) {
                chatPage.style.transform = 'translateX(-100%)';
                adminPage.classList.add('show');
                renderAdmin();
            } else {
                chatPage.style.transform = 'translateX(0)';
                adminPage.classList.remove('show');
                renderChat();
            }
        }

        // ===== СВАЙП ДЛЯ МОБИЛКИ =====
        let touchStartX = 0;
        document.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
        });
        document.addEventListener('touchend', (e) => {
            const diff = e.changedTouches[0].clientX - touchStartX;
            if (Math.abs(diff) > 80) {
                if (diff < -50 && !isAdmin) toggleAdmin();
                if (diff > 50 && isAdmin) toggleAdmin();
            }
        });

        // ===== УТИЛИТЫ =====
        function scrollToBottom(el) {
            requestAnimationFrame(() => {
                el.scrollTop = el.scrollHeight;
            });
        }

        function showToast(text) {
            toastEl.textContent = text;
            toastEl.classList.add('show');
            clearTimeout(toastEl._t);
            toastEl._t = setTimeout(() => toastEl.classList.remove('show'), 2000);
        }

        function formatTime(ts) {
            return new Date(ts).toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
        }

        function formatFull(ts) {
            return new Date(ts).toLocaleString('ru-RU', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' });
        }

        function esc(s) {
            const d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }

        function getColor(name) {
            let hash = 0;
            for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
            return `hsl(${Math.abs(hash) % 360},60%,65%)`;
        }

        // ===== СОБЫТИЯ =====
        msgInput.addEventListener('input', () => {
            sendBtn.disabled = !msgInput.value.trim();
        });
        msgInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') { e.preventDefault();
                sendMessage(); }
        });
        sendBtn.addEventListener('click', sendMessage);
        nameInput.addEventListener('blur', () => {
            localStorage.setItem('chat_name', nameInput.value.trim());
        });

        // Админские Enter
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && activeReplyIndex !== null && isAdmin) {
                const input = document.getElementById('replyInput-' + activeReplyIndex);
                if (document.activeElement === input) {
                    sendAdminReply(activeReplyIndex);
                }
            }
        });

        // ===== АВТООБНОВЛЕНИЕ =====
        let lastCount = 0;
        async function checkUpdates() {
            await loadData();
            const currentCount = messages.filter(m => !m.deleted && !m.system).length;

            if (isAdmin) {
                renderAdmin();
            } else {
                if (currentCount !== lastCount) {
                    renderChat();
                    if (currentCount > lastCount && lastCount > 0) {
                        showToast('📩 Новое сообщение');
                    }
                    lastCount = currentCount;
                }
            }
        }

        // ===== СТАРТ =====
        loadData().then(() => {
            lastCount = messages.filter(m => !m.deleted && !m.system).length;
            renderChat();
        });
        setInterval(checkUpdates, 1500);
    </script>
</body>
  </html>
